<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحول X - Audio Extraction Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', system-ui, sans-serif; }
body { background: #0a0a0f; }
.glow { box-shadow: 0 0 40px rgba(99,102,241,0.15), 0 0 80px rgba(99,102,241,0.05); }
.glow-text { text-shadow: 0 0 40px rgba(99,102,241,0.3); }
.x-letter {
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.pulse-ring {
    animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
@keyframes pulse-ring {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.1; transform: scale(1.05); }
}
.speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), transparent);
    animation: speedLine 1.5s linear infinite;
}
@keyframes speedLine {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100vw); opacity: 0; }
}
.progress-bar {
    background: linear-gradient(90deg, #6366f1, #8b5cf6, #a855f7);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer {
    0%, 100% { background-position: 200% 0; }
    50% { background-position: -200% 0; }
}
.countdown-number {
    font-variant-numeric: tabular-nums;
}
input:-webkit-autofill,
input:-webkit-autofill:focus {
    transition: background-color 600000s 0s, color 600000s 0s;
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <div class="fixed inset-0 pointer-events-none">
        <div class="speed-line" style="top: 15%; animation-delay: 0s;"></div>
        <div class="speed-line" style="top: 30%; animation-delay: 0.4s;"></div>
        <div class="speed-line" style="top: 55%; animation-delay: 0.8s;"></div>
        <div class="speed-line" style="top: 70%; animation-delay: 1.2s;"></div>
        <div class="speed-line" style="top: 85%; animation-delay: 1.6s;"></div>
    </div>

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl"></div>
    </div>

    <main class="relative z-10 w-full max-w-2xl px-6 py-12">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center mb-6">
                <span class="text-7xl font-black x-letter tracking-tighter">X</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-white/90 tracking-tight">
                المحول <span class="x-letter">X</span>
            </h1>
            <p class="text-white/40 text-sm md:text-base mt-3 font-light">
                محرك استخراج صوتي فائق السرعة · <span class="text-indigo-400/60">Zero-Trace</span>
            </p>
            <div class="flex items-center justify-center gap-4 mt-4 text-[11px] text-white/25">
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Xtreme Speed
                </span>
                <span class="w-px h-3 bg-white/10"></span>
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    Zero-Trace
                </span>
                <span class="w-px h-3 bg-white/10"></span>
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Auto-Delete
                </span>
            </div>
        </div>

        <div id="card" class="relative bg-white/[0.03] border border-white/[0.06] rounded-2xl p-6 md:p-8 glow backdrop-blur-xl">
            <form id="extractForm" class="space-y-5">
                <div class="relative">
                    <input
                        id="urlInput"
                        type="url"
                        dir="ltr"
                        placeholder="Paste YouTube URL here..."
                        class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl px-5 py-4 text-white/80 text-sm placeholder-white/20 outline-none transition-all duration-300 focus:border-indigo-500/40 focus:bg-white/[0.06] focus:ring-1 focus:ring-indigo-500/20"
                        required
                    >
                </div>

                <button
                    id="extractBtn"
                    type="submit"
                    class="relative w-full py-4 rounded-xl font-semibold text-sm text-white overflow-hidden transition-all duration-300 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
                >
                    <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        استخراج الصوت
                    </span>
                    <div id="btnLoader" class="absolute inset-0 z-0 hidden">
                        <div class="progress-bar h-full w-full rounded-xl"></div>
                    </div>
                </button>
            </form>

            <div id="errorBox" class="hidden mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400/80 text-sm text-center"></div>

            <div id="resultBox" class="hidden mt-6 pt-6 border-t border-white/[0.06]">
                <div class="text-center mb-5">
                    <div class="inline-flex items-center gap-2 text-white/60 text-xs mb-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                        الملف جاهز للتحميل
                    </div>
                    <p id="fileName" class="text-white/70 text-sm font-medium truncate max-w-full px-4"></p>
                </div>

                <a
                    id="downloadLink"
                    href="#"
                    download
                    class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl font-semibold text-sm text-white bg-white/[0.06] border border-white/[0.08] hover:bg-white/[0.10] transition-all duration-300 active:scale-[0.98]"
                >
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    تحميل الملف
                </a>

                <div class="mt-4 flex items-center justify-center gap-2 text-white/25 text-xs">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>سيتم حذف الملف تلقائياً بعد <span id="countdown" class="countdown-number text-indigo-400/60 font-medium">30</span> ثانية</span>
                </div>
            </div>
        </div>

        <div class="mt-10 grid grid-cols-3 gap-3 text-center">
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">&lt;5s</div>
                <div class="text-white/20 text-[10px] mt-0.5">متوسط وقت الاستخراج</div>
            </div>
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">∞</div>
                <div class="text-white/20 text-[10px] mt-0.5">بدون حدود للتحميل</div>
            </div>
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">0</div>
                <div class="text-white/20 text-[10px] mt-0.5">سجلات · خصوصية تامة</div>
            </div>
        </div>
    </main>

    <script>
    const form = document.getElementById('extractForm');
    const urlInput = document.getElementById('urlInput');
    const extractBtn = document.getElementById('extractBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const errorBox = document.getElementById('errorBox');
    const resultBox = document.getElementById('resultBox');
    const downloadLink = document.getElementById('downloadLink');
    const fileName = document.getElementById('fileName');
    const countdown = document.getElementById('countdown');
    const card = document.getElementById('card');

    let countdownInterval = null;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.classList.add('hidden');
        resultBox.classList.add('hidden');
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

        const url = urlInput.value.trim();
        if (!url) {
            showError('الرجاء إدخال رابط YouTube');
            return;
        }

        extractBtn.disabled = true;
        btnText.classList.add('opacity-0');
        btnLoader.classList.remove('hidden');

        try {
            const response = await fetch('/extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ url })
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.error || 'فشل الاستخراج');
            }

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            const downloadUrl = data.url;
            const name = data.title ? data.title + '.mp3' : 'audio.mp3';

            fileName.textContent = name;

            downloadLink.onclick = (e) => {
                e.preventDefault();
                window.open(downloadUrl, '_blank');
            };

            resultBox.classList.remove('hidden');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });

            startCountdown(30, () => {
                resultBox.classList.add('hidden');
            });

        } catch (err) {
            showError(err.message);
        } finally {
            extractBtn.disabled = false;
            btnText.classList.remove('opacity-0');
            btnLoader.classList.add('hidden');
        }
    });

    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove('hidden');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function startCountdown(seconds, onDone) {
        countdown.textContent = seconds;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            seconds--;
            countdown.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdownInterval);
                countdownInterval = null;
                onDone();
            }
        }, 1000);
    }
    </script>
</body>
</html>
