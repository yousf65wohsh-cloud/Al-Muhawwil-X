<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحول X - استخراج صوت فائق السرعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: #0b0b14;
            --accent-color: #7c3aed;
            --accent-hover: #6d28d9;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #1e1e2f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 580px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background: #121220;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            text-align: left;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn-extract {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .btn-extract:hover {
            background: var(--accent-hover);
        }

        /* صندوق الانتظار الذكي */
        .process-box {
            display: none;
            margin-top: 25px;
            background: #121222;
            border: 1px dashed #3b3b54;
            border-radius: 16px;
            padding: 24px;
        }

        .status-text {
            font-size: 15px;
            color: var(--text-muted);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(124, 58, 237, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            animation: spin 0.8s linear infinite;
        }

        .stats-grid {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }

        .stat-card {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
        }

        .stat-val { font-size: 20px; font-weight: 700; color: #ffffff; }
        .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">X</div>
    <h1 class="title">المحول X</h1>
    <p class="subtitle">محرك استخراج صوتي فائق السرعة • Zero-Trace</p>

    <div class="main-card">
        <input type="text" id="youtubeUrl" placeholder="ضع رابط اليوتيوب هنا...">
        <button class="btn-extract" onclick="extractAudio()">استخراج الصوت</button>

        <div id="processBox" class="process-box">
            <div class="spinner"></div>
            <div id="statusText" class="status-text">جاري فحص المقطع وتخطي حماية يوتيوب...</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">>5s</div><div class="stat-lbl">متوسط وقت الاستخراج</div></div>
        <div class="stat-card"><div class="stat-val">∞</div><div class="stat-lbl">بدون حدود للتحميل</div></div>
        <div class="stat-card"><div class="stat-val">0</div><div class="stat-lbl">سجلات • خصوصية تامة</div></div>
    </div>
</div>

<script>
    function extractAudio() {
        const urlInput = document.getElementById('youtubeUrl').value.trim();
        if (!urlInput) {
            alert("الرجاء إدخال رابط يوتيوب أولاً!");
            return;
        }

        const pBox = document.getElementById('processBox');
        const statusText = document.getElementById('statusText');

        pBox.style.display = 'block';
        statusText.innerText = "جاري فحص المقطع وتخطي حماية يوتيوب...";

        // تغيير النص بعد ثانية ونصف لإعطاء هيبة للتصميم
        setTimeout(() => {
            statusText.innerText = "جاري تشفير الصوت بأعلى جودة MP3 (320kbps)...";
        }, 1500);

        // التوجيه التلقائي المباشر بعد 3.5 ثانية إلى التبويب المستقر
        setTimeout(() => {
            pBox.style.display = 'none';
            const downloadUrl = `https://loader.to/api/card/?url=${encodeURIComponent(urlInput)}&f=mp3`;
            window.open(downloadUrl, '_blank');
        }, 3500);
    }
</script>

</body>
</html>
