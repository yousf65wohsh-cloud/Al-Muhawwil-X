<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="المحول X">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='LOGO.png') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='LOGO.png') }}">
<title>المحول X - Audio Extraction Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', system-ui, sans-serif; }
body { background: #030307; }

body::before {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
    pointer-events: none;
    filter: blur(50px);
    opacity: 0.85;
}

.glow { box-shadow: 0 0 40px rgba(99,102,241,0.15), 0 0 80px rgba(99,102,241,0.05); }
.x-letter {
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), transparent);
    animation: speedLine 1.5s linear infinite;
}
@keyframes speedLine {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100vw); opacity: 0; }
}
.spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(99,102,241,0.15);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-glow {
    box-shadow: 0 0 30px rgba(34,197,94,0.25), 0 0 60px rgba(34,197,94,0.1);
}
.feature-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.03);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.03);
    white-space: nowrap;
}

/* Waveform bars */
.waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 32px;
}
.waveform .bar {
    width: 4px;
    height: 100%;
    background: linear-gradient(to top, #6366f1, #a855f7);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite alternate;
}
.waveform .bar:nth-child(1) { animation-delay: 0s; height: 40%; }
.waveform .bar:nth-child(2) { animation-delay: 0.15s; height: 70%; }
.waveform .bar:nth-child(3) { animation-delay: 0.3s; height: 100%; }
.waveform .bar:nth-child(4) { animation-delay: 0.45s; height: 60%; }
.waveform .bar:nth-child(5) { animation-delay: 0.6s; height: 85%; }
@keyframes wave {
    0% { transform: scaleY(0.3); }
    100% { transform: scaleY(1); }
}

/* Status dot */
.status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34,197,94,0.6);
    animation: pulseDot 2s ease-in-out infinite;
}
@keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* History cards */
.history-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: all 0.2s;
}
.history-item:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(124,58,237,0.2);
}

/* Responsive */
@media (max-width: 640px) {
    .features-wrap {
        flex-wrap: wrap;
        gap: 8px !important;
    }
    .feature-item {
        font-size: 10px;
        padding: 4px 10px;
    }
    .stats-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
    }
    .stats-grid > div {
        padding: 10px 6px;
    }
    .stats-grid .stat-value {
        font-size: 18px;
    }
    .stats-grid .stat-label {
        font-size: 9px;
    }
    .logo-x {
        font-size: 52px;
    }
    .main-title {
        font-size: 24px;
    }
    .card-pad {
        padding: 24px 16px;
    }
    .input-field {
        padding: 14px 16px;
        font-size: 14px;
    }
    .btn-submit {
        padding: 14px;
        font-size: 14px;
    }
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <div class="fixed inset-0 pointer-events-none">
        <div class="speed-line" style="top: 15%; animation-delay: 0s;"></div>
        <div class="speed-line" style="top: 30%; animation-delay: 0.4s;"></div>
        <div class="speed-line" style="top: 55%; animation-delay: 0.8s;"></div>
        <div class="speed-line" style="top: 70%; animation-delay: 1.2s;"></div>
        <div class="speed-line" style="top: 85%; animation-delay: 1.6s;"></div>
    </div>
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl"></div>
    </div>

    <main class="relative z-10 w-full max-w-2xl px-4 sm:px-6 py-8 sm:py-12">
        <div class="text-center mb-8 sm:mb-12">
            <div class="inline-flex items-center justify-center mb-4 sm:mb-6">
                <span class="logo-x text-6xl sm:text-7xl font-black x-letter tracking-tighter">X</span>
            </div>
            <h1 class="main-title text-2xl sm:text-3xl md:text-4xl font-bold text-white/90 tracking-tight">
                المحول <span class="x-letter">X</span>
            </h1>
            <p class="text-white/40 text-xs sm:text-sm md:text-base mt-2 sm:mt-3 font-light">
                محرك استخراج صوتي فائق السرعة · <span class="text-indigo-400/60">Zero-Trace</span>
            </p>
            <div class="features-wrap flex items-center justify-center gap-3 sm:gap-4 mt-3 sm:mt-4 text-[10px] sm:text-[11px] text-white/25">
                <span class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 4px #7c3aed)">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Xtreme Speed
                </span>
                <span class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 4px #7c3aed)">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Zero-Trace
                </span>
                <span class="feature-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 4px #7c3aed)">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Auto-Delete
                </span>
            </div>
        </div>

        <div id="card" class="card-pad relative bg-white/[0.03] border border-white/[0.06] rounded-2xl p-6 sm:p-8 glow backdrop-blur-xl">
            <form id="extractForm" class="space-y-4 sm:space-y-5">
                <div class="relative">
                    <input
                        id="urlInput"
                        type="url"
                        dir="ltr"
                        placeholder="Paste YouTube URL here..."
                        class="input-field w-full bg-white/[0.04] border border-white/[0.08] rounded-xl px-4 sm:px-5 py-3 sm:py-4 text-white/80 text-sm placeholder-white/20 outline-none transition-all duration-300 focus:border-indigo-500/40 focus:bg-white/[0.06] focus:ring-1 focus:ring-indigo-500/20"
                        required
                    >
                </div>
                <button
                    id="extractBtn"
                    type="submit"
                    class="btn-submit relative w-full py-3 sm:py-4 rounded-xl font-semibold text-sm text-white overflow-hidden transition-all duration-300 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
                >
                    <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
                        <svg class="w-4 sm:w-5 h-4 sm:h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        استخراج الصوت
                    </span>
                </button>
            </form>

            <div id="errorBox" class="hidden mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400/80 text-sm text-center"></div>

            <div id="processBox" class="hidden mt-6 p-6 rounded-2xl border border-white/[0.06] bg-white/[0.02] text-center" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
                <div class="flex flex-col items-center justify-center gap-4">
                    <div id="processWaveform" class="waveform">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <p id="processStatus" class="text-white/60 text-sm font-light">جاري فحص المقطع وتخطي حماية يوتيوب...</p>
                </div>
                <p id="processSub" class="hidden text-white/30 text-[11px] mt-3">سيتم التوجيه تلقائياً خلال 3 ثوانٍ...</p>
            </div>
        </div>

        <div id="historyBox" class="mt-4 hidden">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-white/20 text-[10px] font-medium tracking-widest uppercase">Recent</span>
                <span class="h-px flex-1 bg-white/[0.04]"></span>
            </div>
            <div id="historyList" class="space-y-2"></div>
        </div>

        <div class="stats-grid mt-6 sm:mt-10 grid grid-cols-3 gap-2 sm:gap-3 text-center">
            <div class="p-3 sm:p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="stat-value text-indigo-400/50 text-lg sm:text-lg font-bold">&lt;5s</div>
                <div class="stat-label text-white/20 text-[10px] sm:text-[10px] mt-0.5">متوسط وقت الاستخراج</div>
            </div>
            <div class="p-3 sm:p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="stat-value text-indigo-400/50 text-lg sm:text-lg font-bold">∞</div>
                <div class="stat-label text-white/20 text-[10px] sm:text-[10px] mt-0.5">بدون حدود للتحميل</div>
            </div>
            <div class="p-3 sm:p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="stat-value text-indigo-400/50 text-lg sm:text-lg font-bold flex items-center justify-center gap-1.5">
                    <span id="liveCount">0</span>
                </div>
                <div class="stat-label text-white/20 text-[10px] sm:text-[10px] mt-0.5 flex items-center justify-center gap-1.5">
                    <span class="status-dot"></span>
                    سجلات · استخراج ناجح
                </div>
            </div>
        </div>
    </main>

    <script>
    const form = document.getElementById('extractForm');
    const urlInput = document.getElementById('urlInput');
    const errorBox = document.getElementById('errorBox');
    const processBox = document.getElementById('processBox');
    const processWaveform = document.getElementById('processWaveform');
    const processStatus = document.getElementById('processStatus');
    const processSub = document.getElementById('processSub');
    const extractBtn = document.getElementById('extractBtn');
    const historyBox = document.getElementById('historyBox');
    const historyList = document.getElementById('historyList');
    const liveCount = document.getElementById('liveCount');

    const STORAGE_KEY = 'muhawwil_history';
    const COUNT_KEY = 'muhawwil_count';

    function getHistory() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch { return []; }
    }

    function setHistory(h) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
    }

    function getCount() {
        try {
            return parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);
        } catch { return 0; }
    }

    function incrementCount() {
        const c = getCount() + 1;
        localStorage.setItem(COUNT_KEY, String(c));
        liveCount.textContent = c;
    }

    function addHistory(url, title) {
        let h = getHistory();
        h.unshift({ url, title: title || url, time: Date.now() });
        if (h.length > 3) h = h.slice(0, 3);
        setHistory(h);
        renderHistory();
    }

    function renderHistory() {
        const h = getHistory();
        if (h.length === 0) {
            historyBox.classList.add('hidden');
            return;
        }
        historyBox.classList.remove('hidden');
        historyList.innerHTML = h.map(item =>
            `<div class="history-item">
                <div class="flex-1 min-w-0">
                    <div class="text-white/50 text-xs truncate">${escapeHtml(item.title)}</div>
                </div>
                <button onclick="window.open('https://loader.to/api/card/?url=${encodeURIComponent(item.url)}&f=mp3','_blank')" class="shrink-0 text-indigo-400/60 hover:text-indigo-300 text-[10px] font-semibold transition-colors">
                    إعادة تحميل
                </button>
            </div>`
        ).join('');
    }

    function escapeHtml(t) {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    liveCount.textContent = getCount();
    renderHistory();

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        errorBox.classList.add('hidden');

        const url = urlInput.value.trim();
        if (!url || !/(youtube\.com|youtu\.be)/i.test(url)) {
            errorBox.textContent = 'الرجاء إدخال رابط YouTube صحيح';
            errorBox.classList.remove('hidden');
            return;
        }

        extractBtn.disabled = true;
        extractBtn.classList.add('opacity-50');

        processStatus.className = 'text-white/60 text-sm font-light';
        processStatus.textContent = 'جاري فحص المقطع وتخطي حماية يوتيوب...';
        processWaveform.style.display = '';
        processSub.classList.add('hidden');
        processBox.classList.remove('hidden');

        setTimeout(() => {
            processStatus.textContent = 'جاري تشفير الصوت بأعلى جودة MP3 (320kbps)...';
            processSub.classList.remove('hidden');
        }, 1500);

        setTimeout(() => {
            processWaveform.style.display = 'none';
            processStatus.textContent = 'تم بنجاح ✓';
            processStatus.className = 'text-emerald-400 text-sm font-medium';
            processSub.classList.add('hidden');

            addHistory(url, `mp3 from ${url}`);
            incrementCount();

            window.open(
                `https://loader.to/api/card/?url=${encodeURIComponent(url)}&f=mp3`,
                '_blank'
            );

            setTimeout(() => {
                processBox.classList.add('hidden');
                extractBtn.disabled = false;
                extractBtn.classList.remove('opacity-50');
            }, 800);
        }, 3500);
    });
    </script>
</body>
</html>
