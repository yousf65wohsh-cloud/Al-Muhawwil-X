<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحول X - Audio Extraction Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { font-family: 'Inter', system-ui, sans-serif; }
body { background: #0a0a0f; }
.glow { box-shadow: 0 0 40px rgba(99,102,241,0.15), 0 0 80px rgba(99,102,241,0.05); }
.x-letter {
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99,102,241,0.5), transparent);
    animation: speedLine 1.5s linear infinite;
}
@keyframes speedLine {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100vw); opacity: 0; }
}
.spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(99,102,241,0.15);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-glow {
    box-shadow: 0 0 30px rgba(34,197,94,0.25), 0 0 60px rgba(34,197,94,0.1);
}
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <div class="fixed inset-0 pointer-events-none">
        <div class="speed-line" style="top: 15%; animation-delay: 0s;"></div>
        <div class="speed-line" style="top: 30%; animation-delay: 0.4s;"></div>
        <div class="speed-line" style="top: 55%; animation-delay: 0.8s;"></div>
        <div class="speed-line" style="top: 70%; animation-delay: 1.2s;"></div>
        <div class="speed-line" style="top: 85%; animation-delay: 1.6s;"></div>
    </div>

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl"></div>
    </div>

    <main class="relative z-10 w-full max-w-2xl px-6 py-12">
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center mb-6">
                <span class="text-7xl font-black x-letter tracking-tighter">X</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-white/90 tracking-tight">
                المحول <span class="x-letter">X</span>
            </h1>
            <p class="text-white/40 text-sm md:text-base mt-3 font-light">
                محرك استخراج صوتي فائق السرعة · <span class="text-indigo-400/60">Zero-Trace</span>
            </p>
            <div class="flex items-center justify-center gap-4 mt-4 text-[11px] text-white/25">
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    Xtreme Speed
                </span>
                <span class="w-px h-3 bg-white/10"></span>
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    Zero-Trace
                </span>
                <span class="w-px h-3 bg-white/10"></span>
                <span class="flex items-center gap-1.5">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Auto-Delete
                </span>
            </div>
        </div>

        <div id="card" class="relative bg-white/[0.03] border border-white/[0.06] rounded-2xl p-6 md:p-8 glow backdrop-blur-xl">
            <form id="extractForm" class="space-y-5">
                <div class="relative">
                    <input
                        id="urlInput"
                        type="url"
                        dir="ltr"
                        placeholder="Paste YouTube URL here..."
                        class="w-full bg-white/[0.04] border border-white/[0.08] rounded-xl px-5 py-4 text-white/80 text-sm placeholder-white/20 outline-none transition-all duration-300 focus:border-indigo-500/40 focus:bg-white/[0.06] focus:ring-1 focus:ring-indigo-500/20"
                        required
                    >
                </div>

                <button
                    id="extractBtn"
                    type="submit"
                    class="relative w-full py-4 rounded-xl font-semibold text-sm text-white overflow-hidden transition-all duration-300 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100"
                >
                    <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        استخراج الصوت
                    </span>
                </button>
            </form>

            <div id="errorBox" class="hidden mt-4 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400/80 text-sm text-center"></div>

            <div id="processBox" class="hidden mt-6 p-6 rounded-2xl border border-white/[0.06] bg-white/[0.02] text-center" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div id="processSpinner" class="spinner"></div>
                    <p id="processStatus" class="text-white/60 text-sm font-light">جاري فحص الرابط وتخطي قيود يوتيوب...</p>
                </div>

                <p id="processSub" class="hidden text-white/30 text-[11px] mt-2">سيتم التوجيه تلقائياً خلال 3 ثوانٍ...</p>
            </div>
        </div>

        <div class="mt-10 grid grid-cols-3 gap-3 text-center">
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">&lt;5s</div>
                <div class="text-white/20 text-[10px] mt-0.5">متوسط وقت الاستخراج</div>
            </div>
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">∞</div>
                <div class="text-white/20 text-[10px] mt-0.5">بدون حدود للتحميل</div>
            </div>
            <div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]">
                <div class="text-indigo-400/50 text-lg font-bold">0</div>
                <div class="text-white/20 text-[10px] mt-0.5">سجلات · خصوصية تامة</div>
            </div>
        </div>
    </main>

    <script>
    const form = document.getElementById('extractForm');
    const urlInput = document.getElementById('urlInput');
    const errorBox = document.getElementById('errorBox');
    const processBox = document.getElementById('processBox');
    const processSpinner = document.getElementById('processSpinner');
    const processStatus = document.getElementById('processStatus');
    const processSub = document.getElementById('processSub');
    const extractBtn = document.getElementById('extractBtn');

    let redirectTimer = null;

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        errorBox.classList.add('hidden');

        const url = urlInput.value.trim();
        if (!url || !/(youtube\.com|youtu\.be)/i.test(url)) {
            errorBox.textContent = 'الرجاء إدخال رابط YouTube صحيح';
            errorBox.classList.remove('hidden');
            return;
        }

        extractBtn.disabled = true;
        extractBtn.classList.add('opacity-50');

        processStatus.className = 'text-white/60 text-sm font-light';
        processStatus.textContent = 'جاري فحص المقطع وتخطي حماية يوتيوب...';
        processSpinner.style.display = '';
        processSub.classList.add('hidden');
        processBox.classList.remove('hidden');

        setTimeout(() => {
            processStatus.textContent = 'جاري تشفير الصوت بأعلى جودة MP3 (320kbps)...';
            processSub.classList.remove('hidden');
        }, 1500);

        redirectTimer = setTimeout(() => {
            processSpinner.style.display = 'none';
            processStatus.textContent = 'تم بنجاح ✓';
            processStatus.className = 'text-emerald-400 text-sm font-medium';
            processSub.classList.add('hidden');

            window.open(
                `https://loader.to/api/card/?url=${encodeURIComponent(url)}&f=mp3`,
                '_blank'
            );

            setTimeout(() => {
                processBox.classList.add('hidden');
                extractBtn.disabled = false;
                extractBtn.classList.remove('opacity-50');
            }, 800);
        }, 3500);
    });
    </script>
</body>
</html>
